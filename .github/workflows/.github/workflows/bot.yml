name: Auto Telegram Bot

on:
  schedule:
    - cron: '0 6 * * *'  # hər gün 10:00 Bakı vaxtı
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install python-telegram-bot
      - run: python bot.py
